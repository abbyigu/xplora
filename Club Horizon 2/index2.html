<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Xplora — Discovery Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: oklch(0.94 0.012 80); }
  body { font-family: 'Geist', system-ui, sans-serif; color: oklch(0.20 0.012 60); }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 0; height: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="discovery-feed.jsx"></script>

<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "heroQuestion": "Pick a feeling, we'll find the place.",
    "city": "Quebec City",
    "tagline": "Discover. Connect. Experience."
  }/*EDITMODE-END*/;

  const HERO_PRESETS = [
    "What do you feel like exploring today?",
    "Where will today take you?",
    "What's the city hiding from you?",
    "Slow down. Where to?",
    "Pick a feeling, we'll find the place.",
  ];

  function App() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [iosScreen, setIosScreen] = React.useState('feed');
    const [androidScreen, setAndroidScreen] = React.useState('feed');

    return (
      <>
        <DesignCanvas>
          <DCSection
            id="brand"
            title="Xplora — Brand mark & signature"
            subtitle="Working name. Italic display 'x' + roman 'plora'. Used in mockups below."
          >
            <DCArtboard id="mark" label="A · Wordmark" width={520} height={300}>
              <div style={{
                width: '100%', height: '100%',
                background: XPALETTE.beige,
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center', gap: 18,
                padding: 40,
              }}>
                <Wordmark size={88} />
                <div style={{
                  fontFamily: fontMono, fontSize: 11, letterSpacing: 1.6,
                  color: XPALETTE.ink2, textTransform: 'uppercase',
                }}>
                  {tweaks.tagline}
                </div>
                <div style={{
                  display: 'flex', gap: 10, marginTop: 22,
                }}>
                  {[XPALETTE.forestDeep, XPALETTE.terracotta, XPALETTE.beige, XPALETTE.ink].map((c, i) => (
                    <div key={i} style={{
                      width: 38, height: 38, borderRadius: 99, background: c,
                      border: i === 2 ? `1px solid ${XPALETTE.hairline}` : 'none',
                    }} />
                  ))}
                </div>
              </div>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="ios"
            title="iOS — Discovery feed"
            subtitle="Tap the hero card or any local pick to open the detail screen. Tap the back chevron to return."
          >
            <DCArtboard id="ios-feed" label="iPhone · Feed" width={402} height={874}>
              <IOSDevice>
                <DiscoveryFeed
                  city={tweaks.city}
                  question={tweaks.heroQuestion}
                  screen={iosScreen}
                  onNavigate={setIosScreen}
                  topInset={54}
                  bottomInset={34}
                />
              </IOSDevice>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="android"
            title="Android — Discovery feed"
            subtitle="Same architecture, Material chrome. Tap to navigate."
          >
            <DCArtboard id="android-feed" label="Pixel · Feed" width={412} height={892}>
              <AndroidDevice>
                <DiscoveryFeed
                  city={tweaks.city}
                  question={tweaks.heroQuestion}
                  screen={androidScreen}
                  onNavigate={setAndroidScreen}
                  topInset={40}
                  bottomInset={24}
                />
              </AndroidDevice>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>

        <TweaksPanel title="Tweaks">
          <TweakSection title="Hero question">
            <TweakRadio
              value={tweaks.heroQuestion}
              onChange={(v) => setTweak('heroQuestion', v)}
              options={HERO_PRESETS.map(o => ({ value: o, label: o }))}
            />
            <TweakText
              label="Custom"
              value={tweaks.heroQuestion}
              onChange={(v) => setTweak('heroQuestion', v)}
            />
          </TweakSection>
          <TweakSection title="Pilot city">
            <TweakText
              label="City label"
              value={tweaks.city}
              onChange={(v) => setTweak('city', v)}
            />
          </TweakSection>
          <TweakSection title="Tagline">
            <TweakText
              label="Signature"
              value={tweaks.tagline}
              onChange={(v) => setTweak('tagline', v)}
            />
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
